; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
;
; 🔌 COM PORT NOTES:
;   Most students can IGNORE this file — PlatformIO auto-detects
;   the board when you use the VS Code upload button.
;   Only uncomment `monitor_port` below if the auto-detect fails,
;   or if you're using the command line (see README for instructions).

[env:seeed_xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
board_build.flash_mode = dout
board_build.mcu = esp32c3
board_build.f_cpu = 160000000L
build_flags =
  ; Fix USB CDC serial on ESP32-C3 — ensures USB serial is available
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  -DARDUINO_RUNNING_CORE=1
lib_deps =
  links2004/WebSockets
  bblanchon/ArduinoJson
monitor_speed = 115200
; monitor_port = COM9   ; ← Uncomment AND change COM9 to your port if needed